# Docker Compose configuration for the IICPC platform

networks:
  iicpc-network:
    driver: bridge

services:

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - iicpc-network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - iicpc-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: iicpc123
      POSTGRES_DB: iicpc
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - iicpc-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - iicpc-network

  submission-engine:
    build: ./submission-engine
    container_name: submission-engine
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_started
    networks:
      - iicpc-network

  telemetry-ingester:
    build: ./telemetry-ingester
    container_name: telemetry-ingester
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      timescaledb:
        condition: service_started
    networks:
      - iicpc-network

  leaderboard-service:
    build: ./leaderboard-service
    container_name: leaderboard-service
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - iicpc-network

  bot-fleet:
    build: ./bot-fleet
    container_name: bot-fleet
    depends_on:
      redis:
        condition: service_started
    networks:
      - iicpc-network

  # ─── Observability Stack ───────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      api-gateway:
        condition: service_started
      telemetry-ingester:
        condition: service_started
      leaderboard-service:
        condition: service_started
      bot-fleet:
        condition: service_started
    networks:
      - iicpc-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: iicpc123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - iicpc-network
  # ─── Test Engine ───────────────────────────────────────
  test-engine:
    build: ./test-engine
    container_name: test-engine
    ports:
      - "9000:9000"
    networks:
      - iicpc-network

volumes:
  grafana-data: