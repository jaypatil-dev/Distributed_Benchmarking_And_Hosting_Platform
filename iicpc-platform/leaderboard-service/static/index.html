<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IICPC Live Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ IICPC LIVE LEADERBOARD</h1>
  <div id="status">● CONNECTING...</div>
</header>

<div class="container">

  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">Contestants</div>
      <div class="value" id="total-contestants">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Top TPS</div>
      <div class="value" id="top-tps">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Best p99</div>
      <div class="value" id="best-p99">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Last Update</div>
      <div class="value" id="last-update" style="font-size:16px">-</div>
    </div>
  </div>

  <div class="leaderboard">
    <div class="leaderboard-header">🏆 Live Rankings</div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Contestant</th>
          <th>Score</th>
          <th>TPS</th>
          <th>p50</th>
          <th>p90</th>
          <th>p99</th>
          <th>Success</th>
          <th>Rating</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="9" class="empty">Waiting for contestants...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="chart-container">
    <div class="chart-title">📊 Score Distribution</div>
    <canvas id="scoreChart" height="80"></canvas>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
