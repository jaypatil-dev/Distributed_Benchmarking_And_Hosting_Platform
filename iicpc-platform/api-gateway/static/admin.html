<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IICPC — Admin Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>

<div id="admin-page">
  <header>
    <h1>⚡ IICPC</h1>
    <span>Admin Dashboard</span>
    <div class="header-right">
      <span id="admin-username"></span>
      <a href="http://localhost:3000" target="_blank">🏆 Leaderboard</a>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </header>

  <div class="admin-container">

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">Total Users</div>
        <div class="value" id="total-users">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Contestants</div>
        <div class="value" id="total-contestants">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Submissions</div>
        <div class="value" id="total-submissions">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Top Contestant</div>
        <div class="value" id="top-contestant" style="font-size:16px">-</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('users', this)">👥 Users</button>
      <button class="admin-tab" onclick="switchTab('submissions', this)">📋 Submissions</button>
    </div>

    <!-- USERS TABLE -->
    <div id="users-section">
      <div class="section-header">
        <h3>Registered Users</h3>
        <button onclick="loadUsers()" class="refresh-btn">🔄 Refresh</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>Role</th>
              <th>Submissions</th>
              <th>Registered At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="6" class="empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- SUBMISSIONS TABLE -->
    <div id="submissions-section" style="display:none">
      <div class="section-header">
        <h3>All Submissions</h3>
        <button onclick="loadSubmissions()" class="refresh-btn">🔄 Refresh</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Submission ID</th>
              <th>Contestant</th>
              <th>Language</th>
              <th>Status</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="submissions-body">
            <tr><td colspan="7" class="empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="/static/app.js"></script>
<script src="/static/admin.js"></script>
</body>
</html>
